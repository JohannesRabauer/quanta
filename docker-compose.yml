services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-quanta
    ports:
      - "11434:11434"
    volumes:
      - ./ollama/data:/root/.ollama
      - ./ollama/init:/init
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    entrypoint: [ "/bin/sh", "/init/run_ollama.sh" ]

  db:
    image: neo4j:2026.02.3
    container_name: db-quanta
    ports:
      - 7474:7474
      - 7687:7687
    environment:
      - NEO4J_AUTH=neo4j/not-secure
    healthcheck:
      test: [ "CMD", "/var/lib/neo4j/bin/cypher-shell", "-u", "neo4j", "-p", "not-secure", "MATCH () RETURN count(*) as count" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./db/data/:/data/

  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile.with-build
    container_name: backend-quanta
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db-quanta:5432/quanta
      - QUARKUS_DATASOURCE_USERNAME=quanta
      - QUARKUS_DATASOURCE_PASSWORD=not-secure
      - QUARKUS_LANGCHAIN4J_OLLAMA_BASE-URL=http://ollama-quanta:11434
      - QUARKUS_LANGCHAIN4J_LOG-REQUESTS=false
      - QUARKUS_LANGCHAIN4J_LOG-RESPONSES=false
      - QUANTA_FILESYSTEM_PATH=/app/resources/demo-files
    ports:
      - "8080:8080"
    volumes:
      - ./resources/demo-files:/app/resources/demo-files

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-quanta
    depends_on:
      - backend
    ports:
      - "3001:3000"