quarkus.devservices.enabled=false
quarkus.langchain4j.log-requests=true
quarkus.langchain4j.log-responses=true
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.schema-management.strategy=update
quarkus.datasource.username=quanta
quarkus.datasource.password=not-secure
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/quanta
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# --- Ollama profile (default) ---
quarkus.langchain4j.chat-model.provider=ollama
quarkus.langchain4j.embedding-model.provider=ollama
quarkus.langchain4j.ollama.base-url=http://localhost:11434
quarkus.langchain4j.ollama.chat-model.model-name=llama3.2:1b
quarkus.langchain4j.ollama.embedding-model.model-name=qwen3-embedding:0.6b
quarkus.langchain4j.ollama.timeout=3m
quarkus.langchain4j.pgvector.dimension=1024

# --- OpenAI profile: start with -Dquarkus.profile=openai (or QUARKUS_PROFILE=openai) ---
%openai.quarkus.langchain4j.openai.api-key=${OPENAI_API_KEY}
%openai.quarkus.langchain4j.chat-model.provider=openai
%openai.quarkus.langchain4j.embedding-model.provider=openai
%openai.quarkus.langchain4j.openai.chat-model.model-name=gpt-4o-mini
%openai.quarkus.langchain4j.openai.embedding-model.model-name=text-embedding-3-small
%openai.quarkus.langchain4j.pgvector.dimension=1536